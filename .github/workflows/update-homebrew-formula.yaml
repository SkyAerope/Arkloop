name: Update Homebrew Formula

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish without leading v"
        required: true
        type: string
      tag:
        description: "GitHub release tag"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: homebrew-formula-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  update:
    name: Update formula version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.HOMEBREW_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: release
        run: |
          META="$(
            INPUT_VERSION="${{ inputs.version }}" \
            RELEASE_TAG="${{ inputs.tag || github.event.release.tag_name }}" \
            PRINT_JSON=1 \
              node .github/scripts/resolve-release-version.mjs
          )"
          node -e '
            const fs = require("node:fs")
            const meta = JSON.parse(process.argv[1])
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${meta.version}\ntag=${meta.tag}\n`)
          ' "$META"

      - name: Update formula
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          path = Path("packaging/homebrew/arkloop.rb")
          text = path.read_text()
          text = re.sub(r'RELEASE_TAG = "v[^"]+"', f'RELEASE_TAG = "{tag}"', text)
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text)
          path.write_text(text)
          PY
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}

      - name: Commit formula update
        run: |
          if git diff --quiet -- packaging/homebrew/arkloop.rb; then
            echo "Homebrew formula is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/arkloop.rb
          git commit -m "build(homebrew): update arkloop to ${{ steps.release.outputs.version }}"
          git push
